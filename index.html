<!DOCTYPE html>
<html>

<head>
    <title>Attendance System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Attendance Management System</h1>

<div class="box">

    <h2>Add Student</h2>

    <input type="text" id="roll" placeholder="Roll Number">

    <input type="text" id="name" placeholder="Student Name">

    <button id="addStudentBtn">
        Add Student
    </button>

</div>

<div class="box">

    <h2>Add Subject</h2>

    <input type="text" id="subject" placeholder="Subject">

    <button id="addSubjectBtn">
        Add Subject
    </button>

</div>

<div class="box">

    <h2>Take Attendance</h2>

    <select id="subjectSelect"></select>

    <input type="date" id="dateInput">

    <button id="loadBtn">
        Load Students
    </button>

</div>

<div id="attendanceBox"></div>

<div class="box">

    <button id="saveBtn">
        Save Attendance
    </button>

</div>

<div class="box">

    <h2>Attendance Report</h2>

    <select id="reportSubject"></select>

    <input type="date" id="reportDate">

    <button id="reportBtn">
        Show Report
    </button>

    <div id="report"></div>

</div>

<script src="script.js"></script>

</body>
</html>
