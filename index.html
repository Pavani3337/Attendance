<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="homePage">

    <h1>🗓 Attendance Tracker</h1>

    <div class="top">

        <input type="text" id="subjectInput" placeholder="Enter Subject">

        <button id="addSubjectBtn">Add Subject</button>

    </div>

    <div id="subjectsContainer"></div>

</div>

<!-- DASHBOARD -->
<div id="dashboardPage">

    <button id="backBtn">⬅ Back</button>

    <h1 id="subjectTitle"></h1>

    <div class="section">

        <p>Total Classes: <span id="total"></span></p>
        <p>Present: <span id="present"></span></p>
        <p>Absent: <span id="absent"></span></p>
        <p>Attendance: <span id="percentage"></span>%</p>

        <button id="presentBtn">Present</button>
        <button id="absentBtn">Absent</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
